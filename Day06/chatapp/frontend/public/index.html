<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 06 — IT Help Desk Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    #app {
      width: 540px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }

    header button:hover { background: rgba(255,255,255,0.3); }

    /* EXERCISE 1, 2, 5: Configuration Panel */
    #config-panel {
      background: #f8f9fa;
      border-bottom: 1px solid #e8eaed;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      font-size: 0.85rem;
    }

    .config-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .config-group label {
      font-weight: 600;
      color: #202124;
    }

    .config-group select {
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 0.85rem;
      background: #fff;
      cursor: pointer;
    }

    .config-group select:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
    }

    /* EXERCISE 3: Message Counter */
    #stats {
      background: #e8f0fe;
      border-bottom: 1px solid #d2e3fc;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #0d47a1;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messages {
      flex: 1;
      height: 380px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user   { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .bot    { align-self: flex-start; background: #f1f3f4; color: #111; border-bottom-left-radius: 4px; }
    .error  { align-self: flex-start; background: #fce8e6; color: #c5221f; border-bottom-left-radius: 4px; }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
    }

    #user-input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.9rem;
      outline: none;
    }

    #user-input:focus { border-color: #1a73e8; }

    #send-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #0d47a1; }
    #send-btn:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <header>
    🖥️ IT Help Desk Assistant
    <button onclick="clearSession()">New Chat</button>
  </header>

  <!-- EXERCISE 1, 2, 5: Configuration Panel -->
  <div id="config-panel">
    <div class="config-group">
      <label for="persona-select">Persona:</label>
      <select id="persona-select" onchange="updateConfig()">
        <option value="it_helpdesk">IT Help Desk</option>
        <option value="hr_assistant">HR Assistant</option>
        <option value="onboarding_bot">Onboarding Bot</option>
        <option value="finance_helper">Finance Helper</option>
      </select>
    </div>

    <div class="config-group">
      <label for="temperature-select">Temperature:</label>
      <select id="temperature-select" onchange="updateConfig()">
        <option value="0.0">Deterministic (0.0)</option>
        <option value="0.5" selected>Balanced (0.5)</option>
        <option value="1.0">Creative (1.0)</option>
      </select>
    </div>

    <div class="config-group">
      <label for="model-select">Model:</label>
      <select id="model-select" onchange="updateConfig()">
        <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4-turbo">gpt-4-turbo</option>
      </select>
    </div>
  </div>

  <!-- EXERCISE 3: Message Counter & Stats -->
  <div id="stats">
    <span id="message-count">Messages sent: 0</span>
    <span id="session-info">Session: Loading...</span>
  </div>

  <div id="messages">
    <div class="bubble bot">Hi! I'm your assistant. How can I help you today?</div>
  </div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your question…" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const API = "http://localhost:8000";
  let sessionId = "";
  let currentConfig = {
    persona: "it_helpdesk",
    temperature: 0.5,
    model: "gpt-4o-mini"
  };

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  // Send on Enter key
  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  // Load configuration options on startup
  async function loadConfig() {
    try {
      const res = await fetch(`${API}/config`);
      if (res.ok) {
        const config = await res.json();
        console.log("Available config:", config);
      }
    } catch (err) {
      console.error("Could not load config:", err);
    }
  }

  loadConfig();

  function updateConfig() {
    currentConfig.persona = document.getElementById("persona-select").value;
    currentConfig.temperature = parseFloat(document.getElementById("temperature-select").value);
    currentConfig.model = document.getElementById("model-select").value;
  }

  function updateStats(messageCount) {
    const countEl = document.getElementById("message-count");
    const infoEl = document.getElementById("session-info");
    
    countEl.textContent = `Messages sent: ${messageCount}`;
    
    if (sessionId) {
      infoEl.textContent = `Session: ${sessionId.substring(0, 8)}...`;
    }
  }

  function addBubble(text, type) {
    const div = document.createElement("div");
    div.className = `bubble ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addEmptyBotBubble() {
    const div = document.createElement("div");
    div.className = "bubble bot";
    messagesEl.appendChild(div);
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    addBubble(text, "user");

    const botBubble = addEmptyBotBubble();
    botBubble.textContent = "▌";

    try {
      // EXERCISES: Pass persona, temperature, and model
      const res = await fetch(`${API}/chat/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          session_id: sessionId,
          persona: currentConfig.persona,           // EXERCISE 1
          temperature: currentConfig.temperature,   // EXERCISE 2
          model: currentConfig.model,               // EXERCISE 5
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Unknown error" }));
        botBubble.className = "bubble error";
        botBubble.textContent = `Error ${res.status}: ${err.detail}`;
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let reply = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop();

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data:")) continue;

          const json = line.slice("data:".length).trim();
          const event = JSON.parse(json);

          if (event.type === "session_id") {
            sessionId = event.content;        // store session
            
            // EXERCISE 3: Update message counter
            if (event.message_count) {
              updateStats(event.message_count);
            }

          } else if (event.type === "delta") {
            reply += event.content;
            botBubble.textContent = reply + "▌";
            messagesEl.scrollTop = messagesEl.scrollHeight;

          } else if (event.type === "done") {
            botBubble.textContent = reply;

          } else if (event.type === "error") {
            botBubble.className = "bubble error";
            botBubble.textContent = event.content;
          }
        }
      }

    } catch (err) {
      botBubble.className = "bubble error";
      botBubble.textContent = "Could not reach the server. Is the backend running?";
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function clearSession() {
    if (sessionId) {
      await fetch(`${API}/chat/${sessionId}`, { method: "DELETE" }).catch(() => {});
      sessionId = "";
    }
    messagesEl.innerHTML = "";
    addBubble("Session cleared. How can I help you?", "bot");
    updateStats(0);
  }
</script>
</body>
</html>
