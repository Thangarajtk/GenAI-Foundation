<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 06 — IT Help Desk Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #app {
      width: 480px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    #messages {
      flex: 1;
      height: 400px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user   { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
    .bot    { align-self: flex-start; background: #f1f3f4; color: #111; border-bottom-left-radius: 4px; }
    .error  { align-self: flex-start; background: #fce8e6; color: #c5221f; border-bottom-left-radius: 4px; }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e8eaed;
    }

    #user-input {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.9rem;
      outline: none;
    }

    #user-input:focus { border-color: #1a73e8; }

    #send-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    #send-btn:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <header>
    🖥️ IT Help Desk Assistant
    <button onclick="clearSession()">New Chat</button>
  </header>

  <div id="messages">
    <div class="bubble bot">Hi! I'm your IT Help Desk assistant. How can I help you today?</div>
  </div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Type your question…" autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const API = "http://localhost:8000";
  let sessionId = "";

  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  // Send on Enter key
  inputEl.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  function addBubble(text, type) {
    const div = document.createElement("div");
    div.className = `bubble ${type}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  // Creates an empty bot bubble and returns it — we'll fill it token by token
  function addEmptyBotBubble() {
    const div = document.createElement("div");
    div.className = "bubble bot";
    messagesEl.appendChild(div);
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    sendBtn.disabled = true;
    addBubble(text, "user");

    // Create an empty bot bubble; tokens will be appended as they arrive
    const botBubble = addEmptyBotBubble();
    botBubble.textContent = "▌";   // blinking cursor placeholder

    try {
      // POST to the streaming endpoint — response is a text/event-stream
      const res = await fetch(`${API}/chat/stream`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: "Unknown error" }));
        botBubble.className = "bubble error";
        botBubble.textContent = `Error ${res.status}: ${err.detail}`;
        return;
      }

      // Read the stream line by line
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let reply = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // SSE lines look like: "data: {...}\n\n"
        // Split on double-newline to get complete events
        const parts = buffer.split("\n\n");
        buffer = parts.pop();           // last part may be incomplete

        for (const part of parts) {
          const line = part.trim();
          if (!line.startsWith("data:")) continue;

          const json = line.slice("data:".length).trim();
          const event = JSON.parse(json);

          if (event.type === "session_id") {
            sessionId = event.content;        // store session for next message

          } else if (event.type === "delta") {
            reply += event.content;
            botBubble.textContent = reply + "▌";   // show cursor while streaming
            messagesEl.scrollTop = messagesEl.scrollHeight;

          } else if (event.type === "done") {
            botBubble.textContent = reply;          // remove cursor when done

          } else if (event.type === "error") {
            botBubble.className = "bubble error";
            botBubble.textContent = event.content;
          }
        }
      }

    } catch (err) {
      botBubble.className = "bubble error";
      botBubble.textContent = "Could not reach the server. Is the backend running?";
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function clearSession() {
    if (sessionId) {
      await fetch(`${API}/chat/${sessionId}`, { method: "DELETE" }).catch(() => {});
      sessionId = "";
    }
    messagesEl.innerHTML = "";
    addBubble("Session cleared. How can I help you?", "bot");
  }
</script>
</body>
</html>
